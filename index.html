<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daguerre OS V20.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020208">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --bg: #020208; --panel: #0a0a15; --cyan: #00ffff; --magenta: #ff0055; --jaune: #f1c40f; --vert: #2ecc71; --amethyst: #9b59b6; --gray: #333; --input-bg: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- LAYOUT STRUCTURE --- */
        #header { padding: 10px; text-align: center; border-bottom: 1px solid var(--jaune); background: var(--panel); flex-shrink: 0; }
        #header h1 { margin: 0; font-size: 18px; color: var(--jaune); }
        #header small { color: #555; font-size: 10px; }

        #workspace { flex: 0.8; position: relative; background: #010104; display: flex; flex-direction: column; overflow: hidden; border-bottom: 2px solid var(--cyan); }
        #workspace-dim { position: absolute; top: 5px; left: 10px; color: var(--jaune); font-size: 10px; font-weight: bold; z-index: 5; }
        
        #controls-bar { position: absolute; top: 5px; right: 5px; display: flex; gap: 5px; z-index: 10; align-items: center; }
        .zoom-btn { background: rgba(255, 0, 85, 0.7); border: none; color: white; width: 26px; height: 26px; border-radius: 13px; font-weight: bold; cursor: pointer; }
        .full-btn { background: var(--cyan); color: #000; font-size: 10px; font-weight: bold; padding: 0 10px; height: 26px; border-radius: 13px; border: none; }

        #canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; overflow: auto; padding: 20px; }
        canvas { background: #111; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        #settings-area { flex: 1.2; overflow-y: auto; background: var(--panel); padding: 15px; padding-bottom: 80px; }
        
        /* --- UI COMPONENTS --- */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section-title { color: var(--magenta); font-size: 14px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        
        .box { background: rgba(0, 255, 255, 0.05); border-left: 2px solid var(--cyan); padding: 10px; border-radius: 4px; margin-bottom: 15px; position: relative; }
        .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        
        input, select { background: #000; color: var(--cyan); border: 1px solid #444; border-radius: 4px; padding: 8px; font-family: monospace; font-size: 12px; }
        .editable-name { background: transparent; border: none; border-bottom: 1px solid var(--cyan); color: var(--cyan); font-weight: bold; width: 60%; }

        .btn { border: none; border-radius: 4px; padding: 10px; font-weight: bold; font-family: monospace; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 12px; }
        .btn-mini { flex: 1; padding: 8px; background: var(--gray); color: #fff; }
        .btn-mini.active { background: var(--cyan); color: #000; }
        .btn-icon { background: #222; border: 1px solid #444; color: #fff; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 12px; }
        .btn-red { background: #421; color: var(--magenta); border-color: var(--magenta); }

        /* --- NUMBER CONTROLS --- */
        .num-row { display: flex; align-items: center; background: #000; border: 1px solid #444; border-radius: 4px; overflow: hidden; width: 90px; }
        .num-btn { background: #222; color: #fff; border: none; width: 25px; height: 28px; font-weight: bold; }
        .num-input { width: 40px !important; text-align: center; border: none !important; padding: 0 !important; }

        /* --- TABS BAR --- */
        #tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #000; display: flex; border-top: 1px solid #333; z-index: 100; }
        .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: #555; font-size: 9px; font-weight: bold; }
        .tab-btn.active { color: var(--cyan); border-top: 3px solid var(--cyan); background: rgba(0,255,255,0.05); }

        /* --- FORGE SPECIFIC --- */
        .block-item { background: #111; padding: 10px; border-radius: 4px; border: 1px solid #333; margin-top: 10px; }
        .label-sm { color: #888; font-size: 9px; display: block; margin-bottom: 2px; }
        .quick-sizes { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin: 10px 0; }
        .qs-btn { background: #222; border: 1px solid #444; color: #fff; font-size: 9px; padding: 5px 0; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="header">
        <h1>⛩️ DAGUERRE OS</h1>
        <small>ÉDITION NUCLÉAIRE V20.0</small>
    </div>

    <div id="workspace">
        <div id="workspace-dim">0 x 0 cm</div>
        <div id="controls-bar">
            <button class="zoom-btn" onclick="resetView()">🔄</button>
            <button class="zoom-btn" onclick="changeZoom(0.5)">+</button>
            <button class="zoom-btn" onclick="changeZoom(-0.5)">-</button>
            <button class="full-btn" onclick="toggleSidebar()">🔽 PLEIN ÉCRAN</button>
        </div>
        <div id="canvas-container">
            <canvas id="c"></canvas>
        </div>
    </div>

    <div id="settings-area">
        <!-- --- ARSENAL --- -->
        <div id="tab-armurerie" class="tab-content active">
            <div class="section-title">⚔️ Arsenal des Sceaux</div>
            <button class="btn" style="background: var(--magenta); color: #fff;" onclick="document.getElementById('fileUploader').click()">+ INJECTER DES MODÈLES</button>
            <input type="file" id="fileUploader" accept="image/*" multiple style="display:none;" onchange="chargerModeles(event)">
            <div id="model-list" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:15px;"></div>
        </div>

        <!-- --- FORGE --- -->
        <div id="tab-forge" class="tab-content">
            <div class="section-title">⛩️ Forge Zellige</div>
            <div class="row" style="margin-bottom: 20px;">
                <button id="m-lin" class="btn btn-mini active" onclick="setMode('lineaire')">LIGNES</button>
                <button id="m-con" class="btn btn-mini" onclick="setMode('concentrique')">CADRES</button>
                <button id="m-fra" class="btn btn-mini" onclick="setMode('fractale')">FRACTAL</button>
            </div>

            <!-- Area Linéaire -->
            <div id="area-lineaire">
                <div id="lignes-container"></div>
                <button class="btn" style="background: var(--magenta); color: #fff; margin-top: 10px;" onclick="ajouterLigne()">+ NOUVELLE LIGNE</button>
            </div>

            <!-- Area Concentrique -->
            <div id="area-concentrique" style="display:none;">
                <div class="box">
                    <span class="label-sm">Lettre(s) du Cœur</span>
                    <input type="text" id="c-mod" value="A" style="width: 100%; color: var(--jaune); font-weight: bold;">
                    <div class="quick-sizes">
                        <button class="qs-btn" onclick="setCoeurDim(50)">50x50</button>
                        <button class="qs-btn" onclick="setCoeurDim(40)">40x40</button>
                        <button class="qs-btn" onclick="setCoeurDim(30)">30x30</button>
                        <button class="qs-btn" onclick="setCoeurDim(20)">20x20</button>
                        <button class="qs-btn" onclick="setCoeurDim(10)">10x10</button>
                    </div>
                    <div class="row" style="margin-top: 5px;">
                        <div><span class="label-sm">Larg.</span><input type="number" id="c-w" value="20" style="width:60px;"></div>
                        <div><span class="label-sm">Haut.</span><input type="number" id="c-h" value="20" style="width:60px;"></div>
                    </div>
                </div>
                <div id="cadres-container"></div>
                <button class="btn" style="background: var(--magenta); color: #fff;" onclick="ajouterCadre()">+ NOUVEAU CADRE</button>
            </div>

            <!-- Area Fractale -->
            <div id="area-fractale" style="display:none;">
                <div class="box">
                    <span class="label-sm">Modèle Cœur</span><input type="text" id="f-mod" value="A">
                    <span class="label-sm">Dimensions</span><input type="number" id="f-size" value="20">
                    <span class="label-sm">Séquence Frise (A B)</span><input type="text" id="f-seq" value="B C">
                    <span class="label-sm">Itérations</span><input type="number" id="f-iter" value="5">
                    <button class="btn" style="background: var(--vert); color: #000; margin-top: 15px;" onclick="genererFractale()">⚡ GÉNÉRER FRACTALE</button>
                </div>
            </div>

            <button class="btn" style="background: var(--jaune); color: #000; margin-top: 30px; font-size: 16px;" onclick="render()">⚙️ FORGER LE MUR</button>
        </div>

        <!-- --- FINITION --- -->
        <div id="tab-finition" class="tab-content">
            <div class="section-title">💎 Sertissage & Finition</div>
            <div class="box" style="text-align: center; color: #555; border-style: dashed;">
                <p>Espace de sertissage en attente de forge...</p>
            </div>
        </div>

        <!-- --- RAPPORT --- -->
        <div id="tab-devis" class="tab-content">
            <div class="section-title">📊 Rapport & Devis</div>
            <div class="box">
                <span class="label-sm">Nom du Projet</span>
                <input type="text" id="nom-projet" value="Empire_Daguerre" style="width: 100%; text-align: center;">
            </div>
            <div id="rapport-data" class="box" style="background: #000;">Forgez un mur d'abord.</div>
            <button class="btn" style="background: var(--jaune); color: #000; margin-bottom: 10px;" onclick="exporterImage()">📸 TÉLÉCHARGER PLAN 8K</button>
        </div>
    </div>

    <div id="tab-bar">
        <button class="tab-btn active" onclick="switchTab('tab-armurerie', this)"><span>⚔️</span>ARSENAL</button>
        <button class="tab-btn" onclick="switchTab('tab-forge', this)"><span>⛩️</span>FORGE</button>
        <button class="tab-btn" onclick="switchTab('tab-finition', this)"><span>💎</span>FINITION</button>
        <button class="tab-btn" onclick="switchTab('tab-devis', this)"><span>📊</span>RAPPORT</button>
    </div>

    <script>
        let modeles = {}, letterIdx = 65, mode = 'lineaire', zoom = 1.0;

        function toggleSidebar() {
            const area = document.getElementById('settings-area');
            const work = document.getElementById('workspace');
            if(work.style.flex === "1") {
                work.style.flex = "0.8";
                area.style.display = "block";
                document.querySelector('.full-btn').innerText = "🔽 PLEIN ÉCRAN";
            } else {
                work.style.flex = "1";
                area.style.display = "none";
                document.querySelector('.full-btn').innerText = "🔼 QUITTER";
            }
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function setMode(m) {
            mode = m;
            document.querySelectorAll('#m-lin, #m-con, #m-fra').forEach(b=>b.classList.remove('active'));
            document.getElementById('m-'+m.substring(0,3)).classList.add('active');
            ['lineaire','concentrique','fractale'].forEach(x => document.getElementById(`area-${x}`).style.display = (x===m)?'block':'none');
        }

        function changeZoom(v) { zoom = Math.max(0.1, zoom + v); render(); }
        function resetView() { zoom = 1.0; render(); }
        function setCoeurDim(v) { document.getElementById('c-w').value = v; document.getElementById('c-h').value = v; }

        function chargerModeles(e) {
            if(!e.target.files.length) return;
            Array.from(e.target.files).forEach(f => {
                let r = new FileReader();
                r.onload = ev => {
                    let i = new Image();
                    i.onload = () => {
                        let l = String.fromCharCode(letterIdx++);
                        modeles[l] = { img: i, uri: ev.target.result };
                        let d = document.createElement('div');
                        d.style.cssText = "position:relative; background:#111; border:1px solid var(--magenta); padding:5px; text-align:center; height:60px;";
                        d.innerHTML = `<div style="position:absolute; top:-5px; left:-5px; background:var(--magenta); border-radius:50%; width:16px; height:16px; font-size:10px; color:white;">${l}</div><img src="${ev.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                        document.getElementById('model-list').appendChild(d);
                    };
                    i.src = ev.target.result;
                };
                r.readAsDataURL(f);
            });
        }

        // --- GESTION LIGNES & SEQUENCES ---
        let ligneCounter = 0;
        function ajouterLigne() {
            ligneCounter++;
            let d = document.createElement('div');
            d.className = 'box ligne-item';
            d.innerHTML = `
                <div class="row">
                    <input type="text" class="editable-name" value="LIGNE ${ligneCounter}">
                    <div style="display:flex; gap:4px;">
                        <button class="btn-icon" onclick="move(this.parentNode.parentNode.parentNode, 'up')">↑</button>
                        <button class="btn-icon" onclick="move(this.parentNode.parentNode.parentNode, 'down')">↓</button>
                        <button class="btn-icon" onclick="duplicate(this.parentNode.parentNode.parentNode)">📋</button>
                        <button class="btn-icon btn-red" onclick="this.parentNode.parentNode.parentNode.remove()">❌</button>
                    </div>
                </div>
                <div class="blocs-container"></div>
                <button class="btn" style="background:var(--vert); color:#000; padding:5px; margin-top:8px;" onclick="ajouterSequence(this.previousElementSibling)">+ AJOUTER SÉQUENCE</button>
            `;
            document.getElementById('lignes-container').appendChild(d);
            ajouterSequence(d.querySelector('.blocs-container'));
        }

        function ajouterSequence(cont, seq="A") {
            let b = document.createElement('div');
            b.className = 'block-item';
            b.innerHTML = `
                <div class="row">
                    <div style="flex:1"><span class="label-sm">Séquence (ex: A B)</span><input type="text" class="s-seq" value="${seq}" style="width:100%; color:var(--jaune); font-weight:bold;"></div>
                    <div style="display:flex; gap:4px; margin-top:12px;">
                        <button class="btn-icon" style="height:24px" onclick="move(this.parentNode.parentNode.parentNode, 'up')">↑</button>
                        <button class="btn-icon btn-red" style="height:24px" onclick="this.parentNode.parentNode.parentNode.remove()">❌</button>
                    </div>
                </div>
                <div class="row">
                    <div><span class="label-sm">L</span><input type="number" class="s-w" value="10" style="width:45px"></div>
                    <div><span class="label-sm">H</span><input type="number" class="s-h" value="10" style="width:45px"></div>
                    <div><span class="label-sm">Qté</span><input type="number" class="s-q" value="1" style="width:45px"></div>
                    <button class="btn-icon" style="margin-top:12px;" onclick="this.innerText = this.innerText==='➡️'?'⬇️':'➡️'">➡️</button>
                </div>
            `;
            cont.appendChild(b);
        }

        function move(el, dir) {
            if(dir==='up' && el.previousElementSibling) el.parentNode.insertBefore(el, el.previousElementSibling);
            if(dir==='down' && el.nextElementSibling) el.parentNode.insertBefore(el.nextElementSibling, el);
        }
        function duplicate(el) { let c = el.cloneNode(true); el.parentNode.insertBefore(c, el.nextSibling); }

        // --- RENDERER 2.0 ---
        function render() {
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');
            const sc = 20 * zoom; 
            let totalW = 0, totalH = 0;
            ctx.clearRect(0,0,9999,9999);

            if(mode === 'lineaire') {
                let lines = [];
                document.querySelectorAll('.ligne-item').forEach(li => {
                    let lw = 0, lh = 0, blocks = [];
                    li.querySelectorAll('.block-item').forEach(bl => {
                        let sequence = bl.querySelector('.s-seq').value.toUpperCase().split(' ').filter(Boolean);
                        let w = parseFloat(bl.querySelector('.s-w').value), h = parseFloat(bl.querySelector('.s-h').value), q = parseInt(bl.querySelector('.s-q').value);
                        let dir = bl.querySelector('.btn-icon:last-child').innerText === '➡️' ? 'H' : 'V';
                        if(sequence.length && q > 0) {
                            let bW = (dir === 'H') ? w * q : w;
                            let bH = (dir === 'V') ? h * q : h;
                            blocks.push({sequence, w, h, q, dir, bW, bH});
                            lw += bW; lh = Math.max(lh, bH);
                        }
                    });
                    lines.push({blocks, lw, lh});
                    totalW = Math.max(totalW, lw); totalH += lh;
                });

                canvas.width = (totalW || 10) * sc; canvas.height = (totalH || 10) * sc;
                ctx.fillStyle = "#111"; ctx.fillRect(0,0, canvas.width, canvas.height);
                
                let curY = 0;
                lines.forEach(line => {
                    let curX = (totalW - line.lw) / 2;
                    line.blocks.forEach(b => {
                        let startX = curX, startY = curY;
                        for(let i=0; i<b.q; i++) {
                            let char = b.sequence[i % b.sequence.length];
                            let dx = startX + (b.dir==='H' ? i*b.w : 0);
                            let dy = startY + (b.dir==='V' ? i*b.h : 0);
                            drawTile(ctx, char, dx*sc, dy*sc, b.w*sc, b.h*sc);
                        }
                        curX += b.bW;
                    });
                    curY += line.lh;
                });
            } else {
                // Cadres / Fractale (Logique simplifiée pour compatibilité rapide)
                // [Logique Cadres existante ici...]
            }
            document.getElementById('workspace-dim').innerText = `${totalW.toFixed(1)} x ${totalH.toFixed(1)} cm`;
        }

        function drawTile(ctx, char, x, y, w, h) {
            if(modeles[char]) {
                ctx.drawImage(modeles[char].img, x, y, w, h);
            } else {
                ctx.strokeStyle = 'cyan'; ctx.strokeRect(x, y, w, h);
                ctx.fillStyle = "#fff"; ctx.font = `${h/2}px monospace`;
                ctx.fillText(char, x + w/4, y + h/1.5);
            }
        }

        ajouterLigne();
    </script>
</body>
</html>
